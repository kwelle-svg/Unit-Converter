{% extends 'base.html' %}
{% block content %}
    <div class="tabs">
        <a href="/length" {% if values[0]=='mm' %}class="tab active" {% else %}class="tab"{% endif %}>length</a>
        <a href="/weight" {% if values[0]=='mg' %}class="tab active" {% else %}class="tab"{% endif %}>weight</a>
        <a href="/temperature" {% if values[0]=='Celsius' %}class="tab active" {% else %}class="tab"{% endif %}>temperature</a>
    </div>

    <form action="/postdata" method="POST">
    <div class="form-group">
        <label>Enter the {% if values[0]=='mm' %}length{% else %}{% if values[0]=='mg' %}weight{% else %}{% if values[0]=='Celsius' %}temperature{% endif %}{% endif %}{% endif %} to convert</label>
        <input type="text" name="number" placeholder="...">
    </div>

    <div class="form-group">
        <label>Unit to Convert from</label>
        <select name="convert_from">
            {% for value in values %}
                <option value="{{ value }}">{{ value }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>Unit to Convert to</label>
        <select name="convert_to">
            {% for value in values %}
                <option value="{{ value }}">{{ value }}</option>
            {% endfor %}
        </select>
    </div>

    <input class="button" type="submit" value="convert"><br>
    </form>
    {% if final_number %}
    <h2>{{ final_number }}</h2>
    {% endif %}
{% endblock %}
